<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackfoot Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 { transform: rotateY(180deg); }
        #card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        
        /* Fixed Background Layer with Contain and Blue Fill */
        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #001a33; 
            background-image: url("https://raw.githubusercontent.com/mt-daver/blackfoot-flashcards/68fcd038e2ea299ec865f0f5a3ea3a62e54a0a8b/chief-mtn-bg.png");
            background-size: contain;
            background-position: center; 
            background-repeat: no-repeat;
            z-index: -2;
        }

        /* Subtle overlay to ensure UI elements remain readable */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.15);
            z-index: -1;
        }

        /* Glow effect for the Title */
        .text-glow {
            color: rgb(247, 247, 242);
            text-shadow: 
                0 0 10px rgba(234, 164, 0, 0.4),
                0 0 20px rgba(234, 164, 0, 0.2);
            animation: glow-pulse 3s ease-in-out infinite alternate;
        }

        @keyframes glow-pulse {
            from {
                text-shadow: 0 0 8px rgba(234, 164, 0, 0.3), 0 0 15px rgba(234, 164, 0, 0.1);
            }
            to {
                text-shadow: 0 0 15px rgba(234, 164, 0, 0.6), 0 0 30px rgba(234, 164, 0, 0.3);
            }
        }

        /* Subtle outer glow for the card container */
        .card-glow {
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3), 0 0 15px rgba(234, 164, 0, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 font-sans text-slate-800 relative">

    <!-- Background Layers -->
    <div class="page-background"></div>
    <div class="bg-overlay"></div>

    <!-- Container for dynamic audio elements -->
    <div id="audio-container" class="hidden"></div>

    <!-- Main Content Wrapper -->
    <div class="relative z-10 flex flex-col items-center">
        <!-- Header -->
        <div class="mb-12 text-center space-y-2">
            <h1 class="text-3xl md:text-5xl font-bold tracking-tight text-glow">
                Blackfoot Language Cards
            </h1>
            <p class="text-[#2C1E16] font-bold tracking-widest uppercase text-xs bg-white/50 px-4 py-1.5 rounded-full backdrop-blur-sm inline-block shadow-sm" id="card-counter">
                Loading cards...
            </p>
        </div>

        <!-- Flashcard Area -->
        <div class="w-full max-w-lg h-80 cursor-pointer group perspective-1000" id="card-container">
            <div id="card-inner" class="relative w-full h-full transform-style-3d rounded-3xl card-glow">
                
                <!-- FRONT OF CARD (Blackfeet) -->
                <div class="absolute inset-0 w-full h-full backface-hidden bg-[#F0E5D1]/95 backdrop-blur-sm rounded-3xl flex flex-col items-center justify-center border-4 border-[#2C1E16] overflow-hidden">
                    
                    <!-- Tribal Geometric Border Top -->
                    <div class="absolute top-0 inset-x-0 h-16 pointer-events-none opacity-90">
                        <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 100 25">
                            <polygon points="40,0 60,0 50,15" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="45,0 55,0 50,8" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="10,0 30,0 20,20" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="13,0 27,0 20,15" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="5,0 15,0 10,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="25,0 35,0 30,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="70,0 90,0 80,20" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="73,0 87,0 80,15" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="65,0 75,0 70,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="85,0 95,0 90,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        </svg>
                    </div>

                    <!-- Tribal Geometric Border Bottom -->
                    <div class="absolute bottom-0 inset-x-0 h-16 pointer-events-none opacity-90 rotate-180">
                        <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 100 25">
                            <polygon points="40,0 60,0 50,15" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="45,0 55,0 50,8" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="10,0 30,0 20,20" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="13,0 27,0 20,15" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="5,0 15,0 10,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="25,0 35,0 30,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="70,0 90,0 80,20" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="73,0 87,0 80,15" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="65,0 75,0 70,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="85,0 95,0 90,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        </svg>
                    </div>

                    <!-- Tribal Geometric Border Left -->
                    <div class="absolute inset-y-0 left-0 w-8 pointer-events-none opacity-90">
                        <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 20 100">
                            <polygon points="0,15 20,25 0,35" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="0,65 20,75 0,85" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        </svg>
                    </div>

                    <!-- Tribal Geometric Border Right -->
                    <div class="absolute inset-y-0 right-0 w-8 pointer-events-none opacity-90">
                        <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 20 100">
                            <polygon points="20,15 0,25 20,35" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="20,65 0,75 20,85" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        </svg>
                    </div>

                    <!-- Front Content -->
                    <div class="relative z-10 px-12 text-center flex flex-col items-center">
                        <h2 id="text-blackfeet" class="text-3xl md:text-4xl font-bold text-center mb-6 text-[#2C1E16] leading-tight">
                            <i class="ph ph-spinner-gap animate-spin text-4xl text-[#005B9A]"></i>
                        </h2>
                        
                        <button id="play-btn-front" class="hidden w-16 h-16 items-center justify-center rounded-full transition-all duration-300 focus:outline-none border-2 border-[#2C1E16] text-[#2C1E16] bg-transparent hover:bg-[#ECA400] hover:scale-105" title="Play Audio">
                            <i class="ph ph-speaker-high text-3xl"></i>
                        </button>
                        <div id="spacer-front" class="h-16 hidden"></div>
                    </div>
                    
                    <p class="absolute bottom-6 text-[#2C1E16]/50 font-bold text-[10px] uppercase tracking-widest flex items-center gap-2">
                        <i class="ph ph-arrows-clockwise"></i> Click to flip
                    </p>
                </div>

                <!-- BACK OF CARD (English) - Inverted Design -->
                <div class="absolute inset-0 w-full h-full backface-hidden rotate-y-180 bg-[#2C1E16]/95 backdrop-blur-sm rounded-3xl flex flex-col items-center justify-center text-[#F0E5D1] shadow-inner border-4 border-[#F0E5D1] overflow-hidden">
                    
                    <!-- Inverted Tribal Geometric Border Top -->
                    <div class="absolute top-0 inset-x-0 h-16 pointer-events-none opacity-90">
                        <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 100 25">
                            <polygon points="40,0 60,0 50,15" fill="#ECA400" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="45,0 55,0 50,8" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="10,0 30,0 20,20" fill="#ECA400" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="13,0 27,0 20,15" fill="#005B9A" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="5,0 15,0 10,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="25,0 35,0 30,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="70,0 90,0 80,20" fill="#ECA400" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="73,0 87,0 80,15" fill="#005B9A" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="65,0 75,0 70,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="85,0 95,0 90,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        </svg>
                    </div>

                    <!-- Inverted Tribal Geometric Border Bottom -->
                    <div class="absolute bottom-0 inset-x-0 h-16 pointer-events-none opacity-90 rotate-180">
                        <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 100 25">
                            <polygon points="40,0 60,0 50,15" fill="#ECA400" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="45,0 55,0 50,8" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="10,0 30,0 20,20" fill="#ECA400" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="13,0 27,0 20,15" fill="#005B9A" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="5,0 15,0 10,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="25,0 35,0 30,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="70,0 90,0 80,20" fill="#ECA400" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="73,0 87,0 80,15" fill="#005B9A" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="65,0 75,0 70,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="85,0 95,0 90,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        </svg>
                    </div>

                    <!-- Inverted Tribal Geometric Border Left -->
                    <div class="absolute inset-y-0 left-0 w-8 pointer-events-none opacity-90">
                        <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 20 100">
                            <polygon points="0,15 20,25 0,35" fill="#005B9A" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="0,65 20,75 0,85" fill="#005B9A" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        </svg>
                    </div>

                    <!-- Inverted Tribal Geometric Border Right -->
                    <div class="absolute inset-y-0 right-0 w-8 pointer-events-none opacity-90">
                        <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 20 100">
                            <polygon points="20,15 0,25 20,35" fill="#005B9A" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                            <polygon points="20,65 0,75 20,85" fill="#005B9A" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        </svg>
                    </div>

                    <!-- Content -->
                    <div class="relative z-10 flex flex-col items-center justify-center p-8 w-full h-full">
                        <h2 id="text-english" class="text-3xl md:text-4xl font-medium text-center mb-8 leading-tight text-[#F0E5D1]">
                            <i class="ph ph-spinner-gap animate-spin text-4xl text-[#ECA400]"></i>
                        </h2>
                        
                        <button id="play-btn-back" class="hidden w-16 h-16 items-center justify-center rounded-full transition-all duration-300 bg-white/10 backdrop-blur-sm text-[#F0E5D1] hover:bg-white hover:text-[#2C1E16] focus:outline-none border-2 border-[#F0E5D1]/30 hover:border-[#F0E5D1] shadow-sm" title="Play Audio">
                            <i class="ph ph-speaker-high text-3xl"></i>
                        </button>
                        <div id="spacer-back" class="h-16 hidden"></div>

                        <p class="absolute bottom-6 text-[#F0E5D1]/50 font-bold text-[10px] uppercase tracking-widest flex items-center gap-2">
                            <i class="ph ph-arrows-clockwise"></i> Click to flip
                        </p>
                    </div>
                </div>

            </div>
        </div>

        <!-- Navigation Controls (Explicit size for perfect circle) -->
        <div class="mt-12 flex items-center gap-8">
            <button id="btn-prev" class="w-16 h-16 rounded-full bg-white/80 backdrop-blur-sm text-slate-600 shadow-lg border border-slate-200 hover:bg-slate-50 hover:text-[#005B9A] transition-all hover:scale-105 active:scale-95 flex items-center justify-center" aria-label="Previous card">
                <i class="ph ph-caret-left text-2xl"></i>
            </button>
            
            <button id="btn-next" class="w-16 h-16 rounded-full bg-white/80 backdrop-blur-sm text-slate-600 shadow-lg border border-slate-200 hover:bg-slate-50 hover:text-[#005B9A] transition-all hover:scale-105 active:scale-95 flex items-center justify-center" aria-label="Next card">
                <i class="ph ph-caret-right text-2xl"></i>
            </button>
        </div>
    </div>

    <script>
        const GITHUB_JSON_URL = "https://raw.githubusercontent.com/mt-daver/blackfoot-flashcards/main/flashcards.json";
        let flashcardsData = [];
        let currentIndex = 0;
        let isFlipped = false;
        let isPlaying = false;

        const cardContainer = document.getElementById('card-container');
        const cardInner = document.getElementById('card-inner');
        const textBlackfeet = document.getElementById('text-blackfeet');
        const textEnglish = document.getElementById('text-english');
        const cardCounter = document.getElementById('card-counter');
        const playBtnFront = document.getElementById('play-btn-front');
        const playBtnBack = document.getElementById('play-btn-back');
        const spacerFront = document.getElementById('spacer-front');
        const spacerBack = document.getElementById('spacer-back');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function sanitizeGithubUrl(url) {
            if (!url) return url;
            if (url.includes('github.com') && url.includes('/blob/')) return url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
            return url;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function init() {
            try {
                const targetUrl = sanitizeGithubUrl(GITHUB_JSON_URL);
                const response = await fetch(targetUrl);
                if (!response.ok) throw new Error("Fetch failed");
                let data = await response.json();
                flashcardsData = shuffleArray(data);
                syncAudioElements();
                renderCard(currentIndex);
            } catch (err) {
                console.error(err);
                flashcardsData = shuffleArray([{ id: 1, blackfeet: "Aahkitsimio'p niita'paisiksikimiyi", english: "Let's drink coffee.", audioUrl: "https://raw.githubusercontent.com/mt-daver/blackfoot-flashcards/main/eating_lets-drink-coffee.mp3" }, { id: 2, blackfeet: "Aahsikskanaotonni", english: "Pleasant morning.", audioUrl: "https://raw.githubusercontent.com/mt-daver/blackfoot-flashcards/main/greetings_pleasant-morning.mp3" }, { id: 3, blackfeet: "Áíkia'piiwa", english: "What's happening?", audioUrl: "https://raw.githubusercontent.com/mt-daver/blackfoot-flashcards/main/aikiapiiwa.mp3" }]);
                syncAudioElements();
                renderCard(currentIndex);
            }
        }

        function syncAudioElements() {
            const container = document.getElementById('audio-container');
            flashcardsData.forEach(card => {
                if (card.audioUrl && !document.getElementById(`audio-${card.id}`)) {
                    let audioEl = document.createElement('audio');
                    audioEl.id = `audio-${card.id}`;
                    audioEl.src = sanitizeGithubUrl(card.audioUrl);
                    audioEl.preload = 'auto';
                    audioEl.addEventListener('ended', () => { isPlaying = false; updatePlayButtonUI(); });
                    container.appendChild(audioEl);
                }
            });
        }

        function renderCard(index) {
            const card = flashcardsData[index];
            if (!card) return;
            textBlackfeet.textContent = card.blackfeet;
            textEnglish.textContent = card.english;
            cardCounter.textContent = `${index + 1} / ${flashcardsData.length}`;
            isPlaying = false;
            updatePlayButtonUI();
            const hasAudio = !!card.audioUrl;
            playBtnFront.style.display = hasAudio ? 'flex' : 'none';
            playBtnBack.style.display = hasAudio ? 'flex' : 'none';
            spacerFront.style.display = hasAudio ? 'none' : 'block';
            spacerBack.style.display = hasAudio ? 'none' : 'block';
        }

        function toggleFlip() { isFlipped = !isFlipped; cardInner.classList.toggle('rotate-y-180', isFlipped); }
        function handleNext(e) { if (e) e.stopPropagation(); if (isFlipped) toggleFlip(); setTimeout(() => { currentIndex = (currentIndex + 1) % flashcardsData.length; renderCard(currentIndex); }, 150); }
        function handlePrev(e) { if (e) e.stopPropagation(); if (isFlipped) toggleFlip(); setTimeout(() => { currentIndex = (currentIndex - 1 + flashcardsData.length) % flashcardsData.length; renderCard(currentIndex); }, 150); }

        function updatePlayButtonUI() {
            const iconF = playBtnFront.querySelector('i');
            const iconB = playBtnBack.querySelector('i');
            if (isPlaying) {
                playBtnFront.className = "w-16 h-16 flex items-center justify-center rounded-full transition-all duration-300 bg-[#C22026] text-white shadow-lg scale-110 border-2 border-[#C22026]";
                iconF.className = "ph ph-speaker-high text-3xl animate-pulse";
                playBtnBack.className = "w-16 h-16 flex items-center justify-center rounded-full transition-all duration-300 bg-[#ECA400] text-white shadow-lg scale-110 focus:outline-none border-2 border-[#ECA400]";
                iconB.className = "ph ph-speaker-high text-3xl animate-pulse";
            } else {
                playBtnFront.className = "w-16 h-16 flex items-center justify-center rounded-full transition-all duration-300 focus:outline-none border-2 border-[#2C1E16] text-[#2C1E16] bg-transparent hover:bg-[#ECA400] hover:scale-105";
                iconF.className = "ph ph-speaker-high text-3xl";
                playBtnBack.className = "w-16 h-16 flex items-center justify-center rounded-full transition-all duration-300 bg-white/10 backdrop-blur-sm text-[#F0E5D1] hover:bg-white hover:text-[#2C1E16] focus:outline-none border-2 border-[#F0E5D1]/30 hover:border-[#F0E5D1] shadow-sm";
                iconB.className = "ph ph-speaker-high text-3xl";
            }
        }

        function toggleAudio(e) {
            e.stopPropagation();
            const card = flashcardsData[currentIndex];
            const currentAudioEl = document.getElementById(`audio-${card.id}`);
            if (!currentAudioEl) return;
            if (isPlaying) { currentAudioEl.pause(); isPlaying = false; } 
            else { 
                document.querySelectorAll('#audio-container audio').forEach(a => { a.pause(); a.currentTime = 0; });
                currentAudioEl.play().then(() => { isPlaying = true; updatePlayButtonUI(); }).catch(console.error);
            }
            updatePlayButtonUI();
        }

        cardContainer.onclick = toggleFlip;
        btnNext.onclick = handleNext;
        btnPrev.onclick = handlePrev;
        playBtnFront.onclick = toggleAudio;
        playBtnBack.onclick = toggleAudio;
        init();
    </script>
</body>
</html>
